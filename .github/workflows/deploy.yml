name: Deploy

on:
  push:
    branches: [prod]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_lAjOepLfDaFUyAINRNPdz3a0

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend typecheck
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck

      - name: Frontend build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Backend lint
        working-directory: backend
        run: |
          npm ci
          npm run lint

      - name: Backend tests
        working-directory: backend
        run: npm run test
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          ENCRYPTION_KEY: test-encryption-key-1234567890123456

  deploy-frontend:
    name: Deploy Frontend
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_FRONTEND_PROJECT_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: >
          vercel deploy --prod
          --cwd=frontend
          --token=${{ secrets.VERCEL_TOKEN }}
          --scope=${{ env.VERCEL_ORG_ID }}

  deploy-backend:
    name: Deploy Backend
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_BACKEND_PROJECT_ID }}
        run: >
          vercel deploy --prod
          --cwd=backend
          --token=${{ secrets.VERCEL_TOKEN }}
          --scope=${{ env.VERCEL_ORG_ID }}
