name: Set Vercel Env Vars

on:
  workflow_dispatch:
    inputs:
      DATABASE_URL:
        description: 'PostgreSQL connection string'
        required: false
      JWT_ACCESS_SECRET:
        description: 'JWT access token secret (min 32 chars)'
        required: false
      JWT_REFRESH_SECRET:
        description: 'JWT refresh token secret (min 32 chars)'
        required: false
      ENCRYPTION_KEY:
        description: '32-byte hex encryption key (64 hex chars)'
        required: false
      SMTP_HOST:
        description: 'SMTP server hostname'
        required: false
      SMTP_PORT:
        description: 'SMTP server port'
        required: false
      SMTP_SECURE:
        description: 'SMTP use TLS (true/false)'
        required: false
      SMTP_USER:
        description: 'SMTP username'
        required: false
      SMTP_PASS:
        description: 'SMTP password'
        required: false
      EMAIL_FROM:
        description: 'From email address'
        required: false
      EMAIL_FROM_NAME:
        description: 'From email display name'
        required: false
      CONTACT_SALES_EMAIL:
        description: 'Sales inquiry email recipient'
        required: false
      FRONTEND_URL:
        description: 'Frontend URL'
        required: false
      SENTRY_DSN:
        description: 'Sentry DSN (optional)'
        required: false
      DBA_PASSWORD:
        description: 'DBA password for super admin access'
        required: false

env:
  VERCEL_ORG_ID: team_lAjOepLfDaFUyAINRNPdz3a0
  VERCEL_PROJECT_ID: prj_2A9b3vpSqFFOmBE0opFU5vmjI3l3

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Set Vercel env vars via CLI
        shell: bash
        run: |
          INPUTS='${{ toJSON(github.event.inputs) }}'
          echo "$INPUTS" | jq -c 'to_entries[] | select(.value != "")' | while read -r entry; do
            key=$(echo "$entry" | jq -r '.key')
            val=$(echo "$entry" | jq -r '.value')
            echo "Setting $key..."
            echo "$val" | vercel env add "$key" production --force \
              --token=${{ secrets.VERCEL_TOKEN }} \
              --scope=$VERCEL_ORG_ID \
              --project=$VERCEL_PROJECT_ID 2>&1
            echo "$key done"
          done

      - name: Trigger redeploy
        run: |
          vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=$VERCEL_ORG_ID 2>&1
