<h1 style="margin:0 0 8px;font-size:26px;color:#1a1a2e;font-weight:700;">Welcome, {{name}}!</h1>
<p style="margin:0 0 24px;font-size:15px;color:#666;line-height:1.6;">Your account has been set up successfully. You're
    all set to get started with WellZo HR.</p>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0"
    style="background-color:#faf5ff;background:linear-gradient(135deg,#faf5ff 0%,#f0e8f5 100%);border-radius:12px;border:1px solid #e8ddf0;margin-bottom:24px;">
    <tr>
        <td style="padding:24px;">
            <p
                style="margin:0 0 4px;font-size:11px;color:#42275a;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;">
                Your Temporary Password</p>
            <p style="margin:0;font-size:28px;font-weight:800;color:#42275a;letter-spacing:2px;font-family:monospace;">
                {{tempPassword}}</p>
        </td>
    </tr>
</table>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0"
    style="background:#fff8e1;border-radius:10px;border:1px solid #ffe082;margin-bottom:24px;">
    <tr>
        <td style="padding:16px 20px;">
            <p style="margin:0;font-size:13px;color:#f57f17;">
                {{{icon 'warning' 16}}} <strong>Important:</strong> Please change your password immediately after your
                first login for security.
            </p>
        </td>
    </tr>
</table>

<table role="presentation" cellpadding="0" cellspacing="0">
    <tr>
        <td
            style="border-radius:10px;background-color:#42275a;background:linear-gradient(135deg,#42275a 0%,#734b6d 100%);">
            <a href="{{loginUrl}}"
                style="display:inline-block;padding:14px 36px;font-size:14px;font-weight:700;color:#ffffff;text-decoration:none;letter-spacing:0.5px;">Sign
                In to Your Account →</a>
        </td>
    </tr>
</table>
