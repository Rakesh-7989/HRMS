<h1 style="margin:0 0 8px;font-size:24px;color:#1a1a2e;font-weight:700;">Email Verification</h1>
<p style="margin:0 0 28px;font-size:15px;color:#666;line-height:1.6;">Please enter the verification code below to
    confirm your email address.</p>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
    <tr>
        <td align="center"
            style="background-color:#42275a;background:linear-gradient(135deg,#42275a 0%,#734b6d 100%);border-radius:14px;padding:32px;">
            <p
                style="margin:0 0 8px;font-size:11px;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:2px;">
                Your Verification Code</p>
            <p style="margin:0;font-size:42px;font-weight:800;color:#ffffff;letter-spacing:10px;font-family:monospace;">
                {{code}}</p>
        </td>
    </tr>
</table>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0"
    style="background:#f8f6fa;border-radius:10px;margin-bottom:8px;">
    <tr>
        <td style="padding:16px 20px;">
            <p style="margin:0;font-size:13px;color:#888;line-height:1.6;">
                {{{icon 'clock' 14}}} This code expires in <strong style="color:#42275a;">10 minutes</strong>.<br>
                If you didn't request this, you can safely ignore this email.
            </p>
        </td>
    </tr>
</table>
