<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style type="text/css">
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .text-gradient-gold {
            background: linear-gradient(135deg, #d4af37 0%, #f1d592 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-navy {
            background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .scroll-container::-webkit-scrollbar {
            display: none;
        }
        .scroll-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
            cursor: grab;
        }
        .scroll-container:active {
            cursor: grabbing;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

            animation: float 6s ease-in-out infinite;
        }

            position: absolute;

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, useScroll, useTransform, AnimatePresence, useSpring, useInView } = FramerMotion;

        // Icons placeholder components to avoid Lucide complexity in single file
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={`w-${size/4} h-${size/4} ${className}`}></i>;
        };

        const AnimatedNumber = ({ value }) => {
            const [displayValue, setDisplayValue] = useState(0);
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true });

            useEffect(() => {
                if (isInView) {
                    let start = 0;
                    const end = parseInt(value.replace(/[^0-9]/g, ''));
                    if (start === end) return;

                    let totalDuration = 2000;
                    let increment = end / (totalDuration / 16);
                    
                    const timer = setInterval(() => {
                        start += increment;
                        if (start >= end) {
                            setDisplayValue(end);
                            clearInterval(timer);
                        } else {
                            setDisplayValue(Math.floor(start));
                        }
                    }, 16);
                    return () => clearInterval(timer);
                }
            }, [isInView, value]);

            return <span ref={ref}>{displayValue}{value.includes('+') ? '+' : ''}{value.includes('M') ? 'M' : ''}</span>;
        };

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'glass py-4 shadow-sm' : 'bg-transparent py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-navy rounded-full flex items-center justify-center border border-gold/30">
                                <span className="text-gold font-bold text-xl">D</span>
                            </div>
                            <span className={`text-xl font-bold tracking-tight ${scrolled ? 'text-navy' : 'text-white'}`}>DL Group</span>
                        </div>
                        <div className={`hidden md:flex gap-8 items-center ${scrolled ? 'text-navy/80' : 'text-white/80'}`}>
                            <a href="#" className="hover:text-gold transition-colors">Home</a>
                            <a href="#" className="text-gold font-semibold">About Us</a>
                            <a href="#" className="hover:text-gold transition-colors">Services</a>
                            <a href="#" className="hover:text-gold transition-colors">Careers</a>
                            <a href="#" className="px-5 py-2 bg-gold text-navy font-bold rounded-full hover:scale-105 transition-transform">Get Started</a>
                        </div>
                    </div>
                </nav>
            );
        };

        const SectionHero = () => {
            return (
                <section className="relative h-screen flex items-center justify-center overflow-hidden bg-navy text-white">
                    {/* Animated Gradient Background */}
                    <div className="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(17,34,64,1)_0%,rgba(10,25,47,1)_100%)]"></div>
                    
                    {/* Floating Particles */}
                    <div className="absolute inset-0 opacity-20">
                        {[...Array(20)].map((_, i) => (
                            <motion.div
                                key={i}
                                className="particle"
                                initial={{ 
                                    x: Math.random() * window.innerWidth, 
                                    y: Math.random() * window.innerHeight,
                                    scale: Math.random() * 0.5 + 0.5
                                }}
                                animate={{ 
                                    y: [0, -100, 0],
                                    opacity: [0.2, 0.5, 0.2]
                                }}
                                transition={{ 
                                    duration: Math.random() * 10 + 10, 
                                    repeat: Infinity,
                                    ease: "linear"
                                }}
                                style={{ width: Math.random() * 4 + 2 + 'px', height: Math.random() * 4 + 2 + 'px' }}
                            />
                        ))}
                    </div>

                    <div className="relative z-10 text-center px-6 max-w-4xl">

                            initial={{ opacity: 0, y: 40 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 1, ease: [0.16, 1, 0.3, 1] }}

                        >
                            Pioneering Progress <br/>
                            <span className="text-gold/80 italic font-serif">Since 2014</span>

                        <motion.p 
                            initial={{ opacity: 0, y: 20 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 1, ease: [0.16, 1, 0.3, 1], delay: 0.2 }}
                            className="text-lg md:text-2xl text-white/70 max-w-2xl mx-auto leading-relaxed"
                        >
                            DL Group has evolved from a regional finance company into a global enterprise across finance, travel, manpower, and luxury real estate.
                        </motion.p>
                    </div>

                    <motion.div 
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}
                        transition={{ duration: 1, delay: 1 }}

                        <div className="w-[1px] h-12 bg-gradient-to-b from-gold to-transparent"></div>
                    </motion.div>
                </section>
            );

        const SectionMetrics = () => {

            return (
                <section className="py-32 bg-white overflow-hidden">
                    <div className="max-w-7xl mx-auto px-6">

                                    </div>

                            ))}

        const SectionJourney = () => {

                            </div>
                        </div>
                    </div>

                    <div 
                        ref={scrollRef}
                        className="scroll-container flex gap-8 overflow-x-auto px-6 md:px-[calc(50vw-600px)] pb-20 snap-x snap-mandatory"
                        style={{ scrollPaddingLeft: 'max(1.5rem, calc(50vw - 600px))' }}

                                <div className="absolute top-0 right-0 p-8 text-gold/10 pointer-events-none group-hover:scale-125 transition-transform duration-700">

                                <span className="text-7xl font-bold text-navy/5 absolute top-4 left-8 group-hover:text-gold/5 transition-colors duration-500">
                                    {item.year}
                                </span>
                                
                                <div className="relative mt-8">
                                    <span className="inline-block px-4 py-1 bg-gold/10 text-gold rounded-full text-xs font-bold uppercase tracking-widest mb-6">
                                        {item.year} Milestone
                                    </span>
                                    <h3 className="text-3xl font-bold text-navy mb-4 group-hover:text-gold transition-colors duration-300">{item.title}</h3>
                                    <p className="text-navy/60 leading-relaxed text-lg">{item.desc}</p>
                                </div>

                                <div className="mt-10 pt-10 border-t border-navy/5 flex justify-between items-center translate-y-2 group-hover:translate-y-0 transition-transform duration-500">
                                    <div className="flex -space-x-2">
                                        {[1,2,3].map(i => <div key={i} className="w-8 h-8 rounded-full bg-navy/5 border-2 border-white"></div>)}
                                    </div>
                                    <button className="text-gold font-bold text-sm uppercase tracking-widest flex items-center gap-2 group/btn">
                                        Explore <Icon name="arrow-right" size={16} className="group-hover/btn:translate-x-1 transition-transform" />
                                    </button>
                                </div>
                            </motion.div>
                        ))}
                    </div>
                </section>
            );
        };

        const SectionFounder = () => {
            return (
                <section className="py-32 bg-navy text-white overflow-hidden relative">
                    {/* Background Accents */}
                    <div className="absolute top-0 right-0 w-1/2 h-full bg-navy-light/50 skew-x-[-15deg] translate-x-1/4"></div>
                    
                    <div className="max-w-7xl mx-auto px-6 relative z-10">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-16 items-center">
                            {/* Portrait Side */}
                            <div className="lg:col-span-5 relative">
                                <motion.div 
                                    initial={{ opacity: 0, scale: 0.9 }}
                                    whileInView={{ opacity: 1, scale: 1 }}
                                    viewport={{ once: true }}
                                    transition={{ duration: 1, ease: [0.16, 1, 0.3, 1] }}
                                    className="relative z-10 rounded-2xl overflow-hidden shadow-2xl shadow-black/50 aspect-[4/5]"
                                >
                                    <img 
                                        src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=800" 
                                        alt="Thammireddy Dileep" 
                                        className="w-full h-full object-cover grayscale opacity-90 hover:grayscale-0 hover:opacity-100 transition-all duration-700"
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-navy to-transparent opacity-60"></div>
                                    
                                    <div className="absolute bottom-6 left-6 right-6 p-6 glass rounded-xl border-gold/20">
                                        <p className="text-gold font-bold text-xl mb-1">Thammireddy Dileep</p>
                                        <p className="text-white/60 text-sm uppercase tracking-widest">Founder & Chairman</p>
                                    </div>
                                </motion.div>
                                
                                {/* Decorative elements */}
                                <div className="absolute -top-10 -left-10 w-40 h-40 border-t-2 border-l-2 border-gold/30 rounded-tl-[4rem] pointer-events-none"></div>
                                <div className="absolute -bottom-10 -right-10 w-40 h-40 border-b-2 border-r-2 border-gold/30 rounded-br-[4rem] pointer-events-none"></div>
                            </div>
                            
                            {/* Message Side */}
                            <div className="lg:col-span-7">
                                <motion.div
                                    initial={{ opacity: 0, x: 40 }}
                                    whileInView={{ opacity: 1, x: 0 }}
                                    viewport={{ once: true }}
                                    transition={{ duration: 0.8, delay: 0.2 }}
                                >
                                    <Icon name="quote" size={60} className="text-gold opacity-30 mb-8" />
                                    <h2 className="text-4xl md:text-5xl font-bold mb-8 tracking-tight leading-tight">
                                        "Our goal is not just expansion, but to <span className="text-gold">impact lives</span> through trust and innovation."
                                    </h2>
                                    <div className="space-y-6 text-white/70 text-lg leading-relaxed mb-12">
                                        <p>At DL Group, our journey began in 2014 with a simple vision — to build a company based on trust, commitment, and long-term relationships.</p>
                                        <p>Every step of our growth has been driven by dedication, customer satisfaction, and the belief that success comes from creating value for the people we serve.</p>
                                    </div>
                                    
                                    <div className="flex flex-col gap-1">
                                        <p className="text-2xl font-serif italic text-gold">Thammireddy Dileep</p>
                                        <div className="w-16 h-1 bg-gold rounded-full"></div>
                                    </div>
                                </motion.div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const SectionVision = () => {
            const points = [
                "Strategic Global Expansion",
                "Financial Digital Innovation",
                "Sustainable Trusted Partnerships",
                "Premium Lifestyle Services"
            ];

            return (
                <section className="py-40 bg-white">
                    <div className="max-w-4xl mx-auto px-6 text-center">
                        <motion.div
                            initial={{ opacity: 0, y: 30 }}
                            whileInView={{ opacity: 1, y: 0 }}
                            viewport={{ once: true }}
                            transition={{ duration: 0.8 }}
                        >
                            <span className="text-gold font-bold uppercase tracking-[0.4em] text-xs mb-4 block">The Future</span>
                            <h2 className="text-4xl md:text-7xl font-bold text-navy mb-12 tracking-tighter">The Vision of DL Group</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left mt-20">
                                {points.map((point, i) => (
                                    <motion.div 
                                        key={i}
                                        initial={{ opacity: 0, x: -20 }}

                                        transition={{ delay: i * 0.1 }}

                                    >

                                ))}
                            </div>
                        </motion.div>
                    </div>

        const GlobalImpact = () => {

                            {/* Pulse markers */}
